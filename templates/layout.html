<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FLE-agent{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="{{ url_for('index') }}" class="nav-brand">
        <span class="nav-logo">🇫🇷</span>
        <span>FLE<strong>agent</strong></span>
      </a>
      <div class="nav-links">
        <a href="{{ url_for('index') }}">{{ t.nav_home }}</a>
        <div class="lang-toggle">
          <a href="{{ url_for('set_lang', lang='fr') }}" class="lang-btn{% if lang == 'fr' %} active{% endif %}">FR</a>
          <a href="{{ url_for('set_lang', lang='en') }}" class="lang-btn{% if lang == 'en' %} active{% endif %}">EN</a>
        </div>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>{{ t.footer_text }}</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
