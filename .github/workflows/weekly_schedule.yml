name: Weekly Content Pipeline

# Runs in UTC. Europe/Paris is CET (UTC+1) in winter, CEST (UTC+2) in summer.
# Using 08:00 UTC = 09:00 CET / 10:00 CEST — targets 09:00 Paris for newsletter send.

on:
  schedule:
    - cron: "0 8 * * 1"  # Monday 08:00 UTC → send newsletter (09:00 Paris CET)
  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: true
        default: "newsletter"
        type: choice
        options:
          - newsletter

jobs:
  newsletter:
    name: Send newsletter (Monday 09:00 Paris)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 8 * * 1')
    steps:
      - name: Trigger newsletter send
        run: |
          response=$(curl -s -o /tmp/nl_response.json -w "%{http_code}" \
            -X POST "${{ secrets.APP_BASE_URL }}/admin/trigger-newsletter" \
            -H "X-Admin-Token: ${{ secrets.ADMIN_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/nl_response.json
          if [ "$response" -ne 200 ]; then
            echo "ERROR: trigger-newsletter returned HTTP $response"
            exit 1
          fi
